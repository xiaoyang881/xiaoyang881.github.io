<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精品手游合集</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{background:#f8f9fa;padding:15px;}
        .header{text-align:center;padding:20px 0;margin-bottom:20px;background:#409eff;border-radius:12px;color:#fff;}
        .header h1{font-size:22px;margin-bottom:5px;}
        .header p{opacity:0.9;font-size:14px;}
        .search-box{width:90%;max-width:600px;margin:0 auto 30px;display:flex;gap:8px;}
        .search-box input{flex:1;padding:12px 16px;border-radius:8px;border:1px solid #ddd;font-size:16px;outline:none;}
        .search-box input:focus{border-color:#409eff;}
        .search-box button{padding:12px 24px;border-radius:8px;border:none;background:#409eff;color:#fff;font-size:16px;cursor:pointer;}
        .search-box button:hover{background:#337ecc;}
        .category{margin-bottom:35px;}
        .cate-title{font-size:18px;font-weight:bold;color:#2c3e50;margin-bottom:15px;padding-left:10px;border-left:4px solid #409eff;}
        .game-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
        .game-card{background:#fff;border-radius:10px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,0.08);text-align:center;transition:0.3s;}
        .game-card:hover{transform:translateY(-6px);}
        .game-logo{width:75px;height:75px;border-radius:8px;object-fit:cover;margin-bottom:10px;}
        .game-card h3{font-size:16px;color:#222;margin-bottom:6px;}
        .game-card p{font-size:13px;color:#666;margin-bottom:12px;line-height:1.4;}
        .down-btn{display:inline-block;padding:7px 16px;background:#409eff;color:#fff;text-decoration:none;border-radius:6px;font-size:14px;}
        .down-btn:hover{background:#337ecc;}
        .footer{text-align:center;margin-top:60px;color:#999;font-size:13px;}
        .empty-tip{text-align:center;padding:60px 0;color:#999;font-size:16px;}
    </style>
</head>
<body>

<div class="header">
    <h1>精品手游合集专区</h1>
    <p>分类齐全 · 持续上新 · 自由挑选</p >
</div>

<div class="search-box">
    <input type="text" id="gameSearch" placeholder="输入游戏名称搜索...">
    <button onclick="searchGame()">搜索</button>
</div>

<div id="content"></div>

<div class="footer">本页面持续更新新品游戏 · 链接长期有效</div>

<script>
// 你的游戏数据已写在这里
var DATA = {
  "logo": "https://s41.ax1x.com/2026/05/01/peTiemj.jpg",
  "cateList": [
    "复古传奇"
  ],
  "game": {
    "复古传奇": [
      {
        "name": "骷髅传奇",
        "desc": "开局一只小骷髅东西全靠打！",
        "img": "https://s41.ax1x.com/2026/05/01/peTiemj.jpg",
        "url": "https://hw.longxiangpintai6.com/mobile/Downfile/index?gid=225&pid=16522"
      }
    ]
  }
};

function getData() {
    return DATA;
}

function renderFront() {
    let data = getData();
    let games = data.game || {};
    let categories = Object.keys(games);
    let contentDiv = document.getElementById('content');

    if (categories.length === 0) {
        contentDiv.innerHTML = '<div class="empty-tip">暂无上架游戏，敬请期待</div>';
        return;
    }

    let html = '';
    for (let cate of categories) {
        html += `<div class="category"><div class="cate-title">${cate}</div><div class="game-list">`;
        games[cate].forEach(item => {
            html += `
            <div class="game-card">
                < img class="game-logo" src="${item.img}" alt="游戏logo" onerror="this.style.display='none'">
                <h3>${item.name}</h3>
                <p>${item.desc}</p >
                <a href=" " target="_blank" class="down-btn">立即下载</a >
            </div>
            `;
        });
        html += '</div></div>';
    }
    contentDiv.innerHTML = html;
}

function searchGame() {
    let keyword = document.getElementById('gameSearch').value.trim().toLowerCase();
    document.querySelectorAll('.game-card').forEach(card => {
        let name = card.querySelector('h3').innerText.toLowerCase();
        card.style.display = name.includes(keyword) ? 'block' : 'none';
    });
}
document.getElementById('gameSearch').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') searchGame();
});

window.onload = renderFront;
</script>
</body>
</html>
