<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>精品手游合集专区</title>
    <link rel="icon" href="logo.png" type="image/png">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
        body{background:#f8f9fa;padding:15px;}
        .header{display:flex;align-items:center;justify-content:center;gap:15px;padding:20px 0;margin-bottom:20px;background:#409eff;border-radius:12px;color:#fff;}
        .top-logo{width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid #fff;}
        .header-text h1{font-size:22px;margin-bottom:5px;}
        .header-text p{opacity:0.9;font-size:14px;}
        .category{margin-bottom:35px;}
        .cate-title{font-size:18px;font-weight:bold;color:#2c3e50;margin-bottom:15px;padding-left:10px;border-left:4px solid #409eff;}
        .game-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;}
        .game-card{background:#fff;border-radius:10px;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,0.08);text-align:center;}
        .game-logo{width:75px;height:75px;border-radius:8px;object-fit:cover;margin-bottom:10px;}
        .game-card h3{font-size:16px;color:#222;margin-bottom:6px;}
        .game-card p{font-size:13px;color:#666;margin-bottom:12px;line-height:1.4;}
        .down-btn{display:inline-block;padding:7px 16px;background:#409eff;color:#fff;text-decoration:none;border-radius:6px;font-size:14px;}
        .down-btn:hover{background:#337ecc;}
        .footer{text-align:center;margin-top:60px;color:#999;font-size:13px;}
    </style>
</head>
<body>
<div class="header">
    < img class="top-logo" src="logo.png" alt="网站LOGO">
    <div class="header-text">
        <h1>精品手游合集专区</h1>
        <p>分类齐全 · 持续上新 · 自由挑选</p >
    </div>
</div>

<div id="content"></div>

<div class="footer">本页面持续更新新品游戏 · 链接长期有效</div>

<script>
async function loadGame(){
    let res = await fetch("data.json");
    let data = await res.json();
    let html = "";
    for(let cate in data){
        html += `<div class="category">
            <div class="cate-title">${cate}</div>
            <div class="game-list">`;
        data[cate].forEach(item=>{
            html += `
            <div class="game-card">
                < img class="game-logo" src="${item.img}" alt="游戏logo">
                <h3>${item.name}</h3>
                <p>${item.desc}</p >
                <a href=" " class="down-btn">立即下载</a >
            </div>
            `;
        });
        html += `</div></div>`;
    }
    document.getElementById("content").innerHTML = html;
}
loadGame();
</script>
</body>
</html>
